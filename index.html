<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Image Tracker</title>

  <!-- A-Frame -->
  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.4.0/dist/aframe.min.js"></script>

  <!-- AR.js estable -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar-nft.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@300;500;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #0d0d0d;
      --paper: #f5f0e8;
      --accent: #e84b2a;
      --soft: #d4cfc4;
      --mono: 'DM Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--ink);
      color: var(--paper);
      min-height: 100vh;
      overflow: hidden;
    }

    #setup-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    #setup-screen.hidden {
      display: none;
    }

    .setup-title {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .setup-title span {
      color: var(--accent);
    }

    .setup-sub {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--soft);
      margin-bottom: 32px;
    }

    .type-tabs {
      width: 100%;
      max-width: 500px;
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      border: 1px solid rgba(255,255,255,.1);
      background: transparent;
      color: var(--soft);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--mono);
    }

    .tab-btn.active {
      border-color: var(--accent);
      background: rgba(232,75,42,.15);
      color: white;
    }

    .input-row {
      width: 100%;
      max-width: 500px;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      padding: 14px;
      color: white;
      font-family: var(--mono);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      max-width: 500px;
      margin-top: 16px;
      background: var(--accent);
      border: none;
      padding: 16px;
      border-radius: 10px;
      font-family: var(--mono);
      font-weight: bold;
      cursor: pointer;
      color: black;
      text-transform: uppercase;
    }

    #ui-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }

    #status {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      padding: 10px 18px;
      border-radius: 100px;
      font-family: var(--mono);
      font-size: 12px;
      border: 1px solid rgba(255,255,255,.1);
    }

    #status.found {
      background: rgba(232,75,42,.2);
      border-color: var(--accent);
    }

    #instructions {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--soft);
    }

    #ar-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }
  </style>
</head>
<body>

<div id="setup-screen">

  <h1 class="setup-title">
    AR<span>.</span>Web
  </h1>

  <p class="setup-sub">
    realidad aumentada en navegador
  </p>

  <div class="type-tabs">
    <button class="tab-btn active"
            onclick="setMode('hiro', this)">
      Hiro
    </button>

    <button class="tab-btn"
            onclick="setMode('nft', this)">
      NFT
    </button>
  </div>

  <div class="input-row">
    <input
      type="url"
      id="video-url"
      placeholder="URL del video MP4"
      value="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
    />
  </div>

  <div class="input-row" id="nft-row" style="display:none">
    <input
      type="url"
      id="nft-url"
      placeholder="URL del descriptor NFT"
    />
  </div>

  <button class="btn-primary" onclick="launchAR()">
    Iniciar cámara
  </button>

</div>

<div id="ui-overlay">

  <div id="status">
    <span id="status-text">
      Buscando marcador...
    </span>
  </div>

  <div id="instructions">
    Apuntá la cámara al marcador
  </div>

</div>

<div id="ar-container"></div>

<script>

let currentMode = 'hiro';

function setMode(mode, btn) {

  currentMode = mode;

  document
    .querySelectorAll('.tab-btn')
    .forEach(b => b.classList.remove('active'));

  btn.classList.add('active');

  document.getElementById('nft-row').style.display =
    mode === 'nft'
      ? 'block'
      : 'none';
}

function launchAR() {

  const videoUrl =
    document
      .getElementById('video-url')
      .value
      .trim();

  if (!videoUrl) {
    alert('Ingresá una URL válida.');
    return;
  }

  if (currentMode === 'nft') {

    const nftUrl =
      document
        .getElementById('nft-url')
        .value
        .trim();

    if (!nftUrl) {
      alert('Ingresá la URL NFT.');
      return;
    }
  }

  document
    .getElementById('setup-screen')
    .classList.add('hidden');

  document
    .getElementById('ar-container')
    .innerHTML = '';

  if (currentMode === 'hiro') {
    buildHiroScene(videoUrl);
  } else {
    const nftUrl =
      document
        .getElementById('nft-url')
        .value
        .trim();

    buildNFTScene(videoUrl, nftUrl);
  }
}

function createVideoAsset(videoUrl) {

  const assets = document.createElement('a-assets');

  const video = document.createElement('video');

  video.setAttribute('id', 'ar-video');
  video.setAttribute('src', videoUrl);
  video.setAttribute('loop', true);
  video.setAttribute('crossorigin', 'anonymous');
  video.setAttribute('webkit-playsinline', true);
  video.setAttribute('playsinline', true);
  video.setAttribute('autoplay', true);
  video.setAttribute('muted', true);
  video.muted = true;

  assets.appendChild(video);

  return assets;
}

function buildHiroScene(videoUrl) {

  const scene = document.createElement('a-scene');

  scene.setAttribute('embedded', '');
  scene.setAttribute(
    'arjs',
    'sourceType: webcam; debugUIEnabled: false;'
  );

  scene.setAttribute(
    'vr-mode-ui',
    'enabled: false'
  );

  scene.appendChild(
    createVideoAsset(videoUrl)
  );

  const marker =
    document.createElement('a-marker');

  marker.setAttribute('preset', 'hiro');

  const videoPlane =
    document.createElement('a-video');

  videoPlane.setAttribute('src', '#ar-video');
  videoPlane.setAttribute('width', '1.6');
  videoPlane.setAttribute('height', '0.9');
  videoPlane.setAttribute('rotation', '-90 0 0');

  marker.appendChild(videoPlane);

  scene.appendChild(marker);

  const camera =
    document.createElement('a-entity');

  camera.setAttribute('camera', '');

  scene.appendChild(camera);

  document
    .getElementById('ar-container')
    .appendChild(scene);

  setupEvents(marker);
}

function buildNFTScene(videoUrl, nftUrl) {

  const scene = document.createElement('a-scene');

  scene.setAttribute('embedded', '');

  scene.setAttribute(
    'arjs',
    'sourceType: webcam; debugUIEnabled: false;'
  );

  scene.setAttribute(
    'vr-mode-ui',
    'enabled: false'
  );

  scene.appendChild(
    createVideoAsset(videoUrl)
  );

  const nft =
    document.createElement('a-nft');

  nft.setAttribute('type', 'nft');
  nft.setAttribute('url', nftUrl);

  const videoPlane =
    document.createElement('a-video');

  videoPlane.setAttribute('src', '#ar-video');
  videoPlane.setAttribute('width', '1.6');
  videoPlane.setAttribute('height', '0.9');
  videoPlane.setAttribute('rotation', '-90 0 0');

  nft.appendChild(videoPlane);

  scene.appendChild(nft);

  const camera =
    document.createElement('a-entity');

  camera.setAttribute('camera', '');

  scene.appendChild(camera);

  document
    .getElementById('ar-container')
    .appendChild(scene);

  setupEvents(nft);
}

function setupEvents(marker) {

  const status =
    document.getElementById('status');

  const statusText =
    document.getElementById('status-text');

  marker.addEventListener('markerFound', () => {

    status.classList.add('found');

    statusText.textContent =
      'Marcador detectado';

    const video =
      document.getElementById('ar-video');

    if (video) {

      video.muted = true;

      video.play()
        .catch(err => {
          console.log(err);
        });
    }
  });

  marker.addEventListener('markerLost', () => {

    status.classList.remove('found');

    statusText.textContent =
      'Buscando marcador...';
  });
}

</script>

</body>
</html>
