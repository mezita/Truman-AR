<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AR.Web</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.JS -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>

    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@300;500;700&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#0d0d0d;
      --paper:#f5f0e8;
      --accent:#ff5c35;
      --soft:#a1a1a1;
      --mono:'DM Mono', monospace;
      --sans:'Space Grotesk', sans-serif;
    }

    body{
      font-family:var(--sans);
      background:black;
      overflow:hidden;
      color:white;
    }

    #setup-screen{
      position:fixed;
      inset:0;
      z-index:9999;
      background:var(--bg);

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      padding:24px;
    }

    #setup-screen.hidden{
      display:none;
    }

    .title{
      font-size:56px;
      font-weight:700;
      letter-spacing:-2px;
      margin-bottom:10px;
    }

    .title span{
      color:var(--accent);
    }

    .subtitle{
      font-size:12px;
      font-family:var(--mono);
      color:var(--soft);
      margin-bottom:40px;
      text-align:center;
    }

    .input-group{
      width:100%;
      max-width:500px;
      margin-bottom:16px;
    }

    input{
      width:100%;
      border:none;
      outline:none;

      background:rgba(255,255,255,.06);

      border:1px solid rgba(255,255,255,.1);

      color:white;

      padding:16px;
      border-radius:12px;

      font-family:var(--mono);
      font-size:12px;
    }

    input:focus{
      border-color:var(--accent);
    }

    .btn{
      width:100%;
      max-width:500px;

      background:var(--accent);
      color:black;

      border:none;
      outline:none;

      padding:16px;

      border-radius:12px;

      font-family:var(--mono);
      font-size:12px;
      font-weight:700;

      cursor:pointer;

      transition:.2s;
    }

    .btn:hover{
      opacity:.9;
    }

    .help{
      margin-top:24px;
      text-align:center;
      font-size:12px;
      color:var(--soft);
      line-height:1.6;
      max-width:500px;
    }

    .help a{
      color:var(--accent);
      text-decoration:none;
    }

    #overlay{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:100;
    }

    #status{
      position:absolute;
      left:50%;
      bottom:90px;
      transform:translateX(-50%);

      background:rgba(0,0,0,.7);

      border:1px solid rgba(255,255,255,.1);

      padding:12px 18px;

      border-radius:999px;

      font-family:var(--mono);
      font-size:12px;

      backdrop-filter:blur(10px);
    }

    #status.active{
      border-color:var(--accent);
      color:white;
    }

    #instructions{
      position:absolute;
      bottom:24px;
      width:100%;
      text-align:center;

      font-size:12px;
      font-family:var(--mono);
      color:var(--soft);
    }

    #ar-container{
      position:fixed;
      inset:0;
      z-index:1;
    }

  </style>

</head>

<body>

  <!-- SETUP -->

  <div id="setup-screen">

    <div class="title">
      AR<span>.</span>Web
    </div>

    <div class="subtitle">
      Realidad aumentada en navegador
    </div>

    <div class="input-group">
      <input
        type="url"
        id="video-url"
        placeholder="URL del video MP4"
        value="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
      />
    </div>

    <button
      class="btn"
      onclick="launchAR()"
    >
      Iniciar Cámara
    </button>

    <div class="help">

      Abrí este marcador Hiro en otra pantalla o imprimilo:<br><br>

      :contentReference[oaicite:0]{index=0}

    </div>

  </div>

  <!-- UI -->

  <div id="overlay">

    <div id="status">
      Buscando marcador...
    </div>

    <div id="instructions">
      Apuntá la cámara al marcador Hiro
    </div>

  </div>

  <!-- AR -->

  <div id="ar-container"></div>

  <script>

    async function launchAR(){

      console.log("Inicializando AR");

      const videoUrl =
        document
          .getElementById('video-url')
          .value
          .trim();

      if(!videoUrl){

        alert("Ingresá una URL válida");

        return;
      }

      try{

        document
          .getElementById('setup-screen')
          .classList
          .add('hidden');

        document
          .getElementById('ar-container')
          .innerHTML = '';

        buildScene(videoUrl);

      }catch(err){

        console.error(err);

        alert("Error iniciando AR");
      }
    }

    function buildScene(videoUrl){

      console.log("Creando escena");

      const scene =
        document.createElement('a-scene');

      scene.setAttribute(
        'embedded',
        true
      );

      scene.setAttribute(
        'vr-mode-ui',
        'enabled: false'
      );

      scene.setAttribute(
        'renderer',
        'logarithmicDepthBuffer: true;'
      );

      scene.setAttribute(
        'arjs',
        `
        trackingMethod: best;
        sourceType: webcam;
        debugUIEnabled: false;
        `
      );

      /*
      ASSETS
      */

      const assets =
        document.createElement('a-assets');

      const video =
        document.createElement('video');

      video.setAttribute(
        'id',
        'video-texture'
      );

      video.setAttribute(
        'src',
        videoUrl
      );

      video.setAttribute(
        'loop',
        true
      );

      video.setAttribute(
        'crossorigin',
        'anonymous'
      );

      video.setAttribute(
        'webkit-playsinline',
        true
      );

      video.setAttribute(
        'playsinline',
        true
      );

      video.setAttribute(
        'muted',
        true
      );

      video.setAttribute(
        'autoplay',
        true
      );

      video.muted = true;

      assets.appendChild(video);

      scene.appendChild(assets);

      /*
      MARKER
      */

      const marker =
        document.createElement('a-marker');

      marker.setAttribute(
        'preset',
        'hiro'
      );

      marker.setAttribute(
        'smooth',
        true
      );

      /*
      VIDEO PLANE
      */

      const plane =
        document.createElement('a-video');

      plane.setAttribute(
        'src',
        '#video-texture'
      );

      plane.setAttribute(
        'width',
        '1.6'
      );

      plane.setAttribute(
        'height',
        '0.9'
      );

      plane.setAttribute(
        'rotation',
        '-90 0 0'
      );

      plane.setAttribute(
        'position',
        '0 0 0'
      );

      marker.appendChild(plane);

      scene.appendChild(marker);

      /*
      CAMERA
      */

      const camera =
        document.createElement('a-entity');

      camera.setAttribute(
        'camera',
        ''
      );

      scene.appendChild(camera);

      /*
      APPEND
      */

      document
        .getElementById('ar-container')
        .appendChild(scene);

      /*
      EVENTS
      */

      const status =
        document.getElementById('status');

      marker.addEventListener(
        'markerFound',
        async ()=>{

          console.log("Marker encontrado");

          status.innerHTML =
            'Marcador detectado';

          status.classList.add('active');

          try{

            await video.play();

          }catch(err){

            console.log(err);
          }
        }
      );

      marker.addEventListener(
        'markerLost',
        ()=>{

          console.log("Marker perdido");

          status.innerHTML =
            'Buscando marcador...';

          status.classList.remove('active');
        }
      );

      scene.addEventListener(
        'loaded',
        ()=>{

          console.log("Scene loaded");
        }
      );
    }

  </script>

</body>
</html>
